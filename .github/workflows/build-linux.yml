name: Build Linux Packages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 8.4.0)'
        required: true
        default: '8.4.0'

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            # Extract version from tag: v8.4.0 -> 8.4.0
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-xinerama0 \
            libxcb-cursor0 \
            libxkbcommon0 \
            libgl1-mesa-dev \
            libegl1 \
            libfuse2 \
            desktop-file-utils

      - name: Install Python dependencies
        run: pip install -r requirements-linux.txt

      - name: Build with PyInstaller
        run: pyinstaller HealthPro_linux.spec --clean --noconfirm

      - name: Build .deb package
        run: ./linux/build_deb.sh ${{ steps.version.outputs.VERSION }}

      - name: Build AppImage
        run: ./linux/build_appimage.sh ${{ steps.version.outputs.VERSION }}

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: healthpro-deb
          path: build/healthpro_*.deb

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: healthpro-appimage
          path: dist/HealthPro-*-x86_64.AppImage

      - name: Upload to Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/healthpro_*.deb
            dist/HealthPro-*-x86_64.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
